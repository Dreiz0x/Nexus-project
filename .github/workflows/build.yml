name: Build NEXUS APK

on:
  push:
    branches: [ main, master, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find project and build
        run: |
          # Encuentra donde está build.gradle.kts
          BUILD_DIR=$(find . -name "build.gradle.kts" -not -path "*/app/*" | head -1 | xargs dirname)
          echo "Project found at: $BUILD_DIR"
          cd $BUILD_DIR
          
          # Genera wrapper
          gradle wrapper --gradle-version 8.6
          chmod +x gradlew
          
          # Compila
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apk
          path: "**/app-debug.apk"
